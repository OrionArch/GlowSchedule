name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.GLOW_KEYSTORE_BASE64 }}" | base64 -d > app/glowschedule.jks

      - name: Build Release APK
        env:
          GLOW_KEYSTORE_PASSWORD: ${{ secrets.GLOW_KEYSTORE_PASSWORD }}
          GLOW_KEY_PASSWORD: ${{ secrets.GLOW_KEY_PASSWORD }}
          GLOW_KEY_ALIAS: ${{ secrets.GLOW_KEY_ALIAS }}
          GLOW_KEYSTORE_FILE: app/glowschedule.jks
        run: ./gradlew assembleRelease

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD")
          fi

          # Save to file for multiline output
          echo "$COMMITS" > /tmp/changelog.txt

          # Determine if this is a preview/prerelease
          if [[ "${{ steps.version.outputs.VERSION }}" == *"preview"* ]] || [[ "${{ steps.version.outputs.VERSION }}" == *"beta"* ]] || [[ "${{ steps.version.outputs.VERSION }}" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "GlowSchedule ${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.changelog.outputs.prerelease }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
